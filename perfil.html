<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Meu Perfil | VidaDelas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{
background:#f5f6fa;
font-family:Arial, Helvetica, sans-serif;
}

header{
background:#E91E63;
color:white;
padding:30px;
text-align:center;
}

.card{
border:none;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.1);
}

.foto{
width:140px;
height:140px;
border-radius:50%;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
margin:auto;
color:#777;
}

.btn-rosa{
background:#E91E63;
color:white;
}

.btn-rosa:hover{
background:#c2185b;
color:white;
}

</style>

</head>

<body>

<header>

<h2>👤 Meu Perfil</h2>
<p>Gerencie suas informações pessoais.</p>

</header>

<div class="container mt-5">

<div class="card p-5">

<div class="text-center">

<div class="foto">

<i class="fa-solid fa-user"></i>

</div>

<h3 class="mt-3">

Marília Moura

</h3>

<p>Usuária da Plataforma VidaDelas</p>

</div>

<hr>

<div class="row">

<div class="col-md-6 mb-3">

<label>Nome Completo</label>

<input class="form-control"
value="Marília Moura">

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input class="form-control"
value="marilia@email.com">

</div>

<div class="col-md-6 mb-3">

<label>Telefone</label>

<input class="form-control"
value="(75) 99999-9999">

</div>

<div class="col-md-6 mb-3">

<label>Data de nascimento</label>

<input type="date"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Tipo Sanguíneo</label>

<select class="form-control">

<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Contato de Emergência</label>

<input class="form-control">

</div>

</div>

<div class="mt-4">

<button class="btn btn-rosa">

Salvar Alterações

</button>

</div>

</div>

</div>

</body>
</html>
