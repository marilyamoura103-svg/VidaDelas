<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Assistente VidaDelas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f9fa;
font-family:Arial;
}

header{
background:#E91E63;
color:white;
padding:30px;
text-align:center;
}

.card{
max-width:700px;
margin:auto;
margin-top:40px;
border:none;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,.1);
}

.btn-rosa{
background:#E91E63;
color:white;
}

.btn-rosa:hover{
background:#C2185B;
color:white;
}

</style>

</head>

<body>

<header>

<h2>🤖 Assistente VidaDelas</h2>

<p>Orientações educativas sobre sintomas e prevenção.</p>

</header>

<div class="card p-4">

<h4>Como você está se sentindo?</h4>

<label class="mt-3">Selecione um sintoma:</label>

<select class="form-control" id="sintoma">

<option value="">Escolha...</option>

<option value="colica">Cólica intensa</option>

<option value="atraso">Atraso menstrual</option>

<option value="febre">Febre</option>

<option value="sangramento">Sangramento fora do período menstrual</option>

<option value="dor">Dor pélvica</option>

<option value="corrimento">Corrimento incomum</option>

</select>

<button class="btn btn-rosa mt-4" onclick="responder()">

Obter orientação

</button>

<div id="resposta" class="alert alert-info mt-4" style="display:none;">

</div>

<p class="mt-4 text-muted">
<strong>Aviso:</strong> Este assistente fornece apenas orientações educativas. Ele não realiza diagnósticos nem substitui a avaliação de um profissional de saúde.
</p>

</div>

<script>

function responder(){

let s=document.getElementById("sintoma").value;

let texto="";

switch(s){

case "colica":

texto="Cólicas podem ocorrer durante o ciclo menstrual. Caso a dor seja muito intensa, persistente ou diferente do habitual, procure atendimento médico.";

break;

case "atraso":

texto="O atraso menstrual pode ter diversas causas. Se persistir ou houver possibilidade de gravidez, procure orientação em um serviço de saúde.";

break;

case "febre":

texto="Febre pode indicar diferentes condições. Se vier acompanhada de dor intensa, sangramento ou mal-estar importante, procure atendimento imediatamente.";

break;

case "sangramento":

texto="Sangramentos fora do período menstrual merecem avaliação profissional, especialmente se forem intensos ou recorrentes.";

break;

case "dor":

texto="Dor pélvica persistente ou intensa deve ser investigada por um profissional de saúde.";

break;

case "corrimento":

texto="Alterações na cor, odor ou quantidade do corrimento podem indicar infecções ou outras condições. Procure atendimento para avaliação.";

break;

default:

texto="Selecione um sintoma para receber uma orientação educativa.";

}

document.getElementById("resposta").style.display="block";

document.getElementById("resposta").innerHTML=texto;

}

</script>

</body>

</html>
