<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Administrativo | VidaDelas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{
background:#f4f6f9;
font-family:Arial, Helvetica, sans-serif;
}

.sidebar{
position:fixed;
width:250px;
height:100vh;
background:#343a40;
padding-top:20px;
}

.sidebar h3{
color:white;
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#495057;
}

.content{
margin-left:250px;
padding:30px;
}

.card{
border:none;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<div class="sidebar">

<h3>⚙️ Admin</h3>

<a href="#"><i class="fa fa-chart-line"></i> Dashboard</a>

<a href="#"><i class="fa fa-newspaper"></i> Notícias</a>

<a href="#"><i class="fa fa-heart"></i> Campanhas</a>

<a href="#"><i class="fa fa-users"></i> Usuárias</a>

<a href="#"><i class="fa fa-calendar"></i> Eventos</a>

<a href="#"><i class="fa fa-comment"></i> Mensagens</a>

<a href="#"><i class="fa fa-right-from-bracket"></i> Sair</a>

</div>

<div class="content">

<h2>Painel Administrativo</h2>

<div class="row mt-4">

<div class="col-md-3">

<div class="card p-3 text-center">

<h1>256</h1>

<p>Usuárias cadastradas</p>

</div>

</div>

<div class="col-md-3">

<div class="card p-3 text-center">

<h1>18</h1>

<p>Notícias publicadas</p>

</div>

</div>

<div class="col-md-3">

<div class="card p-3 text-center">

<h1>9</h1>

<p>Campanhas ativas</p>

</div>

</div>

<div class="col-md-3">

<div class="card p-3 text-center">

<h1>3.250</h1>

<p>Acessos no mês</p>

</div>

</div>

</div>

<hr>

<h4>Publicar nova notícia</h4>

<form>

<div class="mb-3">

<label>Título</label>

<input type="text" class="form-control">

</div>

<div class="mb-3">

<label>Categoria</label>

<select class="form-control">

<option>Saúde</option>

<option>Campanha</option>

<option>Saúde Mental</option>

<option>Vacinação</option>

</select>

</div>

<div class="mb-3">

<label>Conteúdo</label>

<textarea class="form-control" rows="6"></textarea>

</div>

<button class="btn btn-success">

Publicar

</button>

</form>

</div>

</body>

</html>
