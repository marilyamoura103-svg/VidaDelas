<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | VidaDelas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

body{
    background:linear-gradient(135deg,#ff5d8f,#ff9ab5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    width:420px;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.logo{
    text-align:center;
    font-size:35px;
    font-weight:bold;
    color:#E91E63;
    margin-bottom:20px;
}

.btn-login{
    width:100%;
    background:#E91E63;
    color:white;
    border:none;
}

.btn-login:hover{
    background:#d81b60;
}

a{
    color:#E91E63;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
❤️ VidaDelas
</div>

<h3 class="text-center mb-4">
Entrar
</h3>

<form>

<div class="mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
placeholder="Digite seu email">

</div>

<div class="mb-3">

<label>Senha</label>

<input
type="password"
class="form-control"
placeholder="Digite sua senha">

</div>

<div class="d-grid">

<button class="btn btn-login btn-lg">

Entrar

</button>

</div>

<div class="text-center mt-4">

<p>

Ainda não possui cadastro?

<a href="cadastro.html">

Cadastre-se

</a>

</p>

</div>

</form>

</div>

</body>
</html>
